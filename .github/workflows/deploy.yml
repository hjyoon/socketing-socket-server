name: Go CI

on:
  push:
    branches: [master, golang]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Test
        run: make test
      - name: Coverage
        run: make coverage
